<script>
  function setLanguage(paperId, lang) {
    const langs = ["en", "el"];

    langs.forEach((l) => {
      const title = document.getElementById(`paper-${paperId}-title-${l}`);
      const authors = document.getElementById(`paper-${paperId}-authors-${l}`);
      const abstract = document.getElementById(`abstract-${paperId}-${l}`);
      const flag = document.getElementById(`flag-${l}-${paperId}`);

      if (title) title.style.display = l === lang ? "block" : "none";
      if (authors) authors.style.display = l === lang ? "block" : "none";
      if (abstract) abstract.style.display = l === lang ? "block" : "none";

      if (flag) {
        if (l === lang) {
          flag.style.opacity = "1";
          flag.style.border = "2px solid #015cab";
        } else {
          flag.style.opacity = "0.4";
          flag.style.border = "none";
        }
      }
    });
  }

  function toggleAbstract(id) {
    const abs = document.getElementById(id);
    abs.style.display = abs.style.display === "none" ? "block" : "none";
  }

  document.addEventListener("DOMContentLoaded", function () {
    const allPapers = document.querySelectorAll(
      "[id^='paper-'][id$='-title-en']"
    );
    allPapers.forEach((titleEl) => {
      const paperId = titleEl.id.split("-")[1];
      const hasEl = document.getElementById(`paper-${paperId}-title-el`);
      if (!hasEl) {
        const flagEl = document.getElementById(`flag-el-${paperId}`);
        if (flagEl) {
          flagEl.style.opacity = "0.2";
          flagEl.style.pointerEvents = "none";
          flagEl.title = "No Greek available";
        }
      }
    });
  });
</script>
